<!DOCTYPE html>
<html>
<head>
    <title>EnergyPredict</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <h2>EnergyPredict</h2>
    <div>
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
        <a href="/login">Login</a>
        <a href="/signup">Signup</a>
    </div>
</nav>

<div class="hero fade-in">
    <h1>Wind & Solar Energy Prediction</h1>
    <p>Estimate renewable energy using smart parameters</p>
</div>

<div class="card fade-in">
    <h2>Solar Energy Prediction</h2>

    <!-- 🔥 IMPORTANT: FORM (backend connection) -->
    <form action="/predict" method="POST">
        <input type="number" name="area" placeholder="Area (m²)" required>
        <input type="number" step="0.01" name="efficiency" placeholder="Efficiency" required>
        <input type="number" step="0.01" name="irradiance" placeholder="Irradiance" required>
        <input type="number" step="0.01" name="pr" placeholder="Performance Ratio" required>

        <button type="submit">Calculate</button>
    </form>
</div>

</body>
</html>
