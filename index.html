<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wind & Solar Prediction</title>
    <style>
        body { margin: 0; font-family: Arial; background: #0f172a; color: white; }
        nav { background: #020617; padding: 15px; display: flex; justify-content: space-between; }
        nav a { color: #38bdf8; margin: 0 10px; text-decoration: none; }
        .hero { text-align: center; padding: 100px 20px; }
        .hero h1 { font-size: 3rem; }
        .inputbox { text-align: left; background: #1e293b; padding: 50px; max-width: 400px; margin: 20px auto; border-radius: 8px; }
        .inputbox h2 { margin-bottom: 20px; }
        .inputbox input { width: 100%; padding: 5px; margin: 10px 0 15px; border: none; border-radius: 4px; }
        .inputbox button { width: 100%; margin:10px 0 15px; padding: 5px; background: #38bdf8; border: none; border-radius: 4px; color: white; font-size: 1rem; cursor: pointer; }
        p {margin: 10px 0 0px;}
    </style>
</head>
<body>

<nav>
    <div>EnergyPredict</div>
    <div>
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
        <a href="/login">Login</a>
        <a href="/signup">Signup</a>
    </div>
</nav>

<div class="hero">
    <h1>Wind & Solar Energy Prediction</h1>
    <p>Predict renewable energy availability using advanced data analysis.</p>
</div>

<div class="inputbox">
    <form action="/predict" method="POST">
    <h2>Solar Energy Prediction</h2>
    <p>Area:</p>   
    <input type="number" name="area" placeholder="Area (m²)" required><br>
    <p>Efficiency:</p>
    <input type="number" step="0.01" name="efficiency" placeholder="Efficiency (0.15-0.22)" required><br>
    <p>Irradiance:</p>
    <input type="number" step="0.01" name="irradiance" placeholder="Irradiance (kWh/m²/day)" required><br>
    <p>Performance Ratio:</p>
    <input type="number" step="0.01" name="pr" placeholder="Performance Ratio (0.75-0.85)" required><br>

    <button type="submit">Calculate</button>
</form>
</div>

</body>
</html>
