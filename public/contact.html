<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EnergyPredict - Contact</title>
  <meta name="description" content="Contact EnergyPredict Team">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    @keyframes neonPulse {
      0%, 100% { text-shadow: 0 0 7px rgba(0,240,255,0.5), 0 0 20px rgba(0,240,255,0.3); }
      50% { text-shadow: 0 0 12px rgba(0,240,255,0.8), 0 0 35px rgba(0,240,255,0.5); }
    }
    .neon-text { animation: neonPulse 3s ease-in-out infinite; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in-up { animation: fadeInUp 0.6s ease forwards; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
  <script src="/js/theme.js"></script>
</head>
<body class="min-h-screen bg-gray-50 text-gray-900 dark:bg-[#050510] dark:text-gray-200 transition-colors duration-300">

  <nav id="navbar" class="sticky top-0 z-[99] bg-white/85 dark:bg-gray-900/85 backdrop-blur-xl border-b border-gray-200 dark:border-white/5 transition-colors duration-300" style="transform: translateZ(0);"></nav>

  <div class="max-w-2xl mx-auto px-4 py-10">
    <div class="text-center mb-8 fade-in-up">
      <h1 class="text-3xl md:text-4xl font-bold text-cyan-600 dark:text-cyan-400 dark:neon-text mb-3" style="font-family: 'Orbitron', sans-serif;">
        Contact Us
      </h1>
      <p class="text-gray-600 dark:text-gray-400">Have questions or feedback? We'd love to hear from you!</p>
    </div>

    <div class="bg-white border border-gray-200 dark:bg-gray-800/50 dark:border-white/10 rounded-2xl p-8 backdrop-blur-xl shadow-2xl fade-in-up transition-colors duration-300">
      <!-- Success Message -->
      <div id="successMsg" class="hidden bg-green-100 border border-green-300 text-green-700 dark:bg-green-500/10 dark:border-green-500/20 dark:text-green-400 px-4 py-2.5 rounded-lg text-sm mb-4 text-center">
        ✅ Message sent successfully!
      </div>
      <!-- Error Message -->
      <div id="errorMsg" class="hidden bg-pink-100 border border-pink-300 text-pink-700 dark:bg-pink-500/10 dark:border-pink-500/20 dark:text-pink-400 px-4 py-2.5 rounded-lg text-sm mb-4 text-center">
        ❌ Failed to send. Try again.
      </div>

      <form id="contactForm" class="space-y-4">
        <div>
          <label class="block text-sm text-gray-700 dark:text-gray-300 mb-1">Your Name</label>
          <input type="text" id="name" placeholder="John Doe" required
            class="w-full px-4 py-3 rounded-lg bg-gray-100 border border-gray-300 text-gray-900 dark:bg-gray-900/60 dark:border-white/10 dark:text-gray-200 text-sm outline-none focus:border-cyan-500 focus:ring-2 focus:ring-cyan-500/20 dark:focus:border-cyan-400 dark:focus:ring-cyan-400/20 transition-all placeholder-gray-400 dark:placeholder-gray-500">
        </div>
        <div>
          <label class="block text-sm text-gray-700 dark:text-gray-300 mb-1">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required
            class="w-full px-4 py-3 rounded-lg bg-gray-100 border border-gray-300 text-gray-900 dark:bg-gray-900/60 dark:border-white/10 dark:text-gray-200 text-sm outline-none focus:border-cyan-500 focus:ring-2 focus:ring-cyan-500/20 dark:focus:border-cyan-400 dark:focus:ring-cyan-400/20 transition-all placeholder-gray-400 dark:placeholder-gray-500">
        </div>
        <div>
          <label class="block text-sm text-gray-700 dark:text-gray-300 mb-1">Message</label>
          <textarea id="message" placeholder="Your message..." required rows="4"
            class="w-full px-4 py-3 rounded-lg bg-gray-100 border border-gray-300 text-gray-900 dark:bg-gray-900/60 dark:border-white/10 dark:text-gray-200 text-sm outline-none focus:border-cyan-500 focus:ring-2 focus:ring-cyan-500/20 dark:focus:border-cyan-400 dark:focus:ring-cyan-400/20 transition-all placeholder-gray-400 dark:placeholder-gray-500 resize-y"></textarea>
        </div>
        <button type="submit" id="submitBtn"
          class="w-full py-3 bg-gradient-to-r from-cyan-400 to-cyan-600 text-gray-900 font-bold text-sm uppercase tracking-widest rounded-lg hover:scale-[1.02] hover:shadow-lg hover:shadow-cyan-500/30 transition-all"
          style="font-family: 'Orbitron', sans-serif;">
          📨 Send Message
        </button>
      </form>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/navbar.js"></script>
  <script>
    document.getElementById('contactForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const message = document.getElementById('message').value;
      const submitBtn = document.getElementById('submitBtn');

      document.getElementById('successMsg').classList.add('hidden');
      document.getElementById('errorMsg').classList.add('hidden');
      submitBtn.textContent = 'Sending...';
      submitBtn.disabled = true;

      try {
        const response = await fetch('/api/contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, message })
        });

        if (response.ok) {
          document.getElementById('successMsg').classList.remove('hidden');
          document.getElementById('contactForm').reset();
        } else {
          document.getElementById('errorMsg').classList.remove('hidden');
        }
      } catch (error) {
        document.getElementById('errorMsg').classList.remove('hidden');
      }

      submitBtn.textContent = '📨 Send Message';
      submitBtn.disabled = false;
    });
  </script>
</body>
</html>
