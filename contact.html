<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact</title>
    <style>
        body { margin: 0; font-family: Arial; background: #0f172a; color: white; }
        nav { background: #020617; padding: 15px; }
        nav a { color: #38bdf8; margin: 10px; text-decoration: none; }
        .container { padding: 50px; }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            background: #38bdf8;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<nav>
    <a href="/">Home</a>
    <a href="/about">About</a>
    <a href="/contact">Contact</a>
    <a href="/login">Login</a>
    <a href="/signup">Signup</a>
</nav>

<div class="container">
    <h1>Contact Us</h1>
    <form action="/contact-submit" method="post">
        <input type="text" placeholder="Your Name" name="name">
        <input type="email" placeholder="Your Email" name="email">
        <button>Send</button>
    </form>
</div>

</body>
</html>
