<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hero fade-in">
    <h1>Solar Energy Prediction</h1>
</div>

<div class="card fade-in">
    <h2 id="energyValue">--</h2>
    <p>kWh / day</p>

    <a href="/">Calculate Again</a>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const energy = params.get("energy");

document.getElementById("energyValue").innerText =
    energy ? parseFloat(energy).toFixed(2) : "No Data";
</script>

</body>
</html>
