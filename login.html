<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body { margin: 0; font-family: Arial; background: #020617; color: white; }
        nav { background: #0f172a; padding: 15px; }
        nav a { color: #38bdf8; margin: 10px; text-decoration: none; }
        .container { padding: 50px; text-align: center; }
        input {
            width: 250px;
            padding: 10px;
            margin: 10px;
        }
        button {
            padding: 10px 20px;
            background: #38bdf8;
            border: none;
        }
    </style>
</head>
<body>

<nav>
    <a href="/">Home</a>
    <a href="/about">About</a>
    <a href="/contact">Contact</a>
    <a href="/login">Login</a>
    <a href="/signup">Signup</a>
</nav>

<div class="container">
    <h1>Login</h1>
    <form action="/login-submit" method="post">
        <input type="text" placeholder="Your Name" name="name">
        <input type="email" placeholder="Your Email" name="email">
        <button>Send</button>
    </form>
</div>

</body>
</html>
